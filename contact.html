<section class="page-hero">
  <h1>Contact Us</h1>
  <p>Questions, corrections, or partnership inquiries — we'd love to hear from you.</p>
</section>

<section class="section" style="padding-top:0">
  <div class="form-card">
    <form id="contact-form" action="mailto:hello@techhowto.com" method="post" enctype="text/plain">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required/>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required/>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject">
          <option>General inquiry</option>
          <option>Correction / feedback</option>
          <option>Partnership / sponsorship</option>
          <option>Affiliate program</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn-primary">Send Message →</button>
    </form>
    <p class="muted" style="margin-top:20px;text-align:center">Or email us directly: <a href="mailto:hello@techhowto.com">hello@techhowto.com</a></p>
    <div class="footer-socials" style="justify-content:center;margin-top:16px">
      <a class="social-btn" href="https://twitter.com/techhowto" target="_blank" rel="noopener" aria-label="Twitter">𝕏</a>
      <a class="social-btn" href="https://youtube.com/@techhowto" target="_blank" rel="noopener" aria-label="YouTube">▶</a>
      <a class="social-btn" href="https://github.com/techhowto" target="_blank" rel="noopener" aria-label="GitHub">⌥</a>
    </div>
  </div>
</section>

  </div>
</footer>
